design-system:
  HardcodedColor:
    active: true
  HardcodedDp:
    active: true
  MaterialThemeUsage:
    active: true
  DirectTextStyle:
    active: true
  NestedContainer:
    active: true
  ComponentRegistryRule:
    active: true
    # Set this to the prefix used in your project's design system.
    # If your components are named AcmeButton, AcmeCard etc., set this to "Acme".
    componentPrefix: 'App'
  ImportBoundaryRule:
    active: true
  RedundantScreenTitleRule:
    active: true
    # Severity is Warning — legitimate section headers exist inside content.
    # Review each finding before removing the Text() call.
  HardcodedGridColumnsRule:
    active: true
    # GridCells.Fixed(1) is exempt. Fixed(2+) triggers this rule.
    # Fix: GridCells.Adaptive(minSize = Xdp) or WindowSizeClass guard.
