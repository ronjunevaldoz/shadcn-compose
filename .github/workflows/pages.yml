name: Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  # ─── Build catalog app for web (wasm + JS fallback) ─────────────────────────
  build:
    name: Build web demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      # Combines the wasmJs and js distributions so browsers without wasm
      # support (older Safari) fall back to the JS target automatically.
      - name: Build web distribution
        run: ./gradlew :app:webApp:composeCompatibilityBrowserDistribution

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/webApp/build/dist/composeWebCompatibility/productionExecutable

  # ─── Deploy to GitHub Pages ─────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
